<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Css\page-02.css">
</head>


<body>

    <div class="container">
        <div class="form-image">
            <img src="img/MODEL.png">
        </div>
        <div class ="form">
            <form action="#">
                <div class="form-header">   
                    <div class="title">
                        <h1>Cadastre-se</h1>
                            </div>
                                

                    <div class="login-button">
                        <button><a href="motoristas.html">Entrar</a></button>
                    </div>
                </div>
                                   
                <div class="input-group">

                    
                    <div class="input-box">
                        <label for="firstname">Primerio nome:</label>
                        <input type="text" id="firstname" name="firstname" placeholder="Digite seu primerio nome..." required>
                    </div>


                    <div class="input-box">
                        <label for="lastname">Sobrenome:</label>
                       <input type="text" id="lastname" name="lastname" placeholder="Digite seu segundo nome..." required>
                    </div>


                    <div class="input-box">
                        <label for="email">Email:</label>
                       <input type="email" id="email" name="email" placeholder="Digite seu E-mail..." required>
                    </div>


                    <div class="input-box">
                        <label for="number">Celular:</label>
                       <input type="tel" id="number" name="number" placeholder="(xx) xxxx-xxxx..." required>
                    </div>


                    <div class="input-box">
                        <label for="password">Senha:</label>
                       <input type="password" id="password" name="password" placeholder="Digite sua senha..." required>
                    </div>

                    
                    <div class="input-box">
                        <label for="Confirmpassword">Confirme sua senha:</label>
                       <input type="Confirmpassword" id="Confirmpassword" name="Confirmpassword" placeholder="Digite sua senha..." required>
                    </div>
                    
                </div>
            




                    <div class="genere-inputs">
                        <div>
                            <h6>Gênero</h6>
                        </div>

                        <div class="gender-group">

                            <div class="gender-input">
                                <input type="radio" id="female" name="gender">
                                <label for="female">Feminino</label>
                            </div>
                        

                              <div class="gender-input">
                                <input type="radio" id="male" name="gender">
                                <label for="male">Masculino</label>
                            </div>
                        

                              <div class="gender-input">
                                <input type="radio" id="others" name="gender">
                                <label for="others">Outros</label>
                            </div>
                        

                              <div class="gender-input">
                                <input type="radio" id="female" name="none">
                                <label for="none">Prefiro não dizer</label> 
                            </div>
                                               
                        </div>
                    </div>

                    <div class="continue-botton">
                        <button><a href="#">continuar</a></button>
                    </div>
        </form>           
     </div>  
 </div>

<div id="logout">
    <a href="motoristas.html">
        <i class="fa-solid fa-arrow-right-from-bracket" style="color: rgb(100, 220, 160);"></i>
    </a>                     
</div>


</body>

</html>
